<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RoBERTa Web{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark navbar-shell sticky-top">
    <div class="container py-2">
      <a class="navbar-brand brand-mark" href="{{ url_for('main.dashboard') }}">
        <span class="brand-orb"></span>
        <span>RoBERTa AI</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto nav-pills gap-2">
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'main.dashboard' %}active{% endif %}" href="{{ url_for('main.dashboard') }}">Inicio</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'main.analizar_texto' %}active{% endif %}" href="{{ url_for('main.analizar_texto') }}">Texto</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'main.analizar_pdf' %}active{% endif %}" href="{{ url_for('main.analizar_pdf') }}">PDF</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'main.buscar_noticias_view' %}active{% endif %}" href="{{ url_for('main.buscar_noticias_view') }}">Noticias</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'main.analisis_masivo' %}active{% endif %}" href="{{ url_for('main.analisis_masivo') }}">Masivo</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="flash-stack mb-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'warning' if category == 'warning' else 'danger' if category == 'danger' else 'info' }} border-0 shadow-sm mb-2">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}
    </div>

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
